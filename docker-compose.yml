services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord_dev
      POSTGRES_DB: concord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"   # HTTP/WS
      - "7881:7881"   # RTC/TCP
      - "7882:7882/udp" # RTC/UDP
    command: >
      --dev
      --bind 0.0.0.0
    environment:
      LIVEKIT_KEYS: "devkey: secret"

volumes:
  postgres_data:
  redis_data:
