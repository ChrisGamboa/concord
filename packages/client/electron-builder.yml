appId: com.concord.app
productName: Concord

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json

mac:
  category: public.app-category.social-networking
  target:
    - dmg
    - zip
  # Code signing (set CSC_LINK and CSC_KEY_PASSWORD env vars, or remove to skip)
  identity: null

win:
  target:
    - nsis

linux:
  target:
    - AppImage
    - deb
  category: Network
  artifactName: "Concord-${version}-${arch}.${ext}"

# Auto-updater: publish to GitHub Releases
publish:
  provider: github
  owner: ChrisGamboa
  repo: concord
  releaseType: release
