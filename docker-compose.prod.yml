services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-concord_prod}
      POSTGRES_DB: concord
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-concord_redis}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./deploy/livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

volumes:
  postgres_data:
  redis_data:
